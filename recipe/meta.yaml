{% set name = "requests_oauth2client" %}
{% set version = "1.8.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/requests_oauth2client-{{ version }}.tar.gz
  sha256: a550f18c41bae5082548257b8a4cd453da6315552f451fc81352c2aaa79b89b3

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - poetry-core >=1.0.0
    - pip
  run:
    - python >={{ python_min }}
    - requests >=2.19.0
    - binapy >=0.8
    - furl >=2.1.2
    - jwskate >=0.11.1
    - attrs >=23.2.0

test:
  imports:
    - requests_oauth2client
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/guillp/requests_oauth2client
  summary: An OAuth2.x client based on `requests`.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - melonhead901
